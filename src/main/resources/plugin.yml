name: SpatialHeatmap
version: "1.0.0"
main: com.heatmap.HeatmapPlugin
api-version: "1.20"
description: A spatial analytics engine that visualizes player activity as 3D particle heatmaps.
authors: [Shahid]

commands:
  heatmap:
    description: Manage the Spatial Heatmap analytics engine.
    usage: /heatmap <show|stop|info|reload> [event_type] [radius]
    permission: heatmap.admin
    aliases: [hm]

permissions:
  heatmap.admin:
    description: Grants access to all heatmap commands.
    default: op
